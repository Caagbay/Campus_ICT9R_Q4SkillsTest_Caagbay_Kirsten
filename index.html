<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-image: url(https://i.pinimg.com/1200x/9c/05/b8/9c05b8eafa27d9d9e65c95208e878828.jpg);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        .login-card {
            width: 400px;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .logo-placeholder { font-size: 3rem; color: #2c3e50; }
    </style>
</head>
<body>

    <div class="card login-card p-4 text-center">
        <div class="logo-placeholder">⋆˚꩜｡</div>
        <h2 class="fw-bold mb-4">Login</h2>
        
        <form id="loginForm">
            <div class="mb-3 text-start">
                <label class="badge bg-dark mb-1"></label>
               <input type="text" id="username" class="form-control rounded-pill text-center" placeholder="Username" required>
            </div>
            <div class="mb-3 text-start">
                <label class="badge bg-dark mb-1"></label>
                <input type="password" id="password" class="form-control rounded-pill text-center" placeholder="Password" required>
            </div>
            

            <div class="d-grid gap-2 d-md-block">
                <button type="button" onclick="handleLogin()" class="btn btn-info text-white rounded-pill px-4">Login</button>
                <button type="reset" class="btn btn-link text-decoration-none text-dark">Cancel</button>
            </div>
        </form>

    
    </div>

<script>
   
    let attempt_counter = 0;

    function handleLogin() {
       
        let user = document.getElementById('username').value;
        let pass = document.getElementById('password').value;
        
        
        if (attempt_counter >= 3) {
            alert("Access denied. Account locked!");
            return; 
        }

       
        if (user === "student" && pass === "1234") {
            alert("Welcome " + user + "!");
            attempt_counter = 0; // Reset on success
            window.location.href = "notebooks.html";
        } 
        else {
           
            attempt_counter++;
            
           
            if (attempt_counter < 3) {
                alert("Invalid! Attempt " + attempt_counter + " of 3.");
            } else {
                alert("Access denied. Account locked after 3 attempts!");
                
            }
        }
    }
</script>

</body>
</html>
